<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAMAS 2026 · Neural Command</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" />
  <style>
    :root {
      --primary: #00f5ff;
      --accent: #a855f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: #05080f;
      color: #e0f2fe;
      overflow: hidden;
      position: relative;
    }

    .bg-universe {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 30% 20%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(0, 200, 255, 0.08) 0%, transparent 60%),
        #05080f;
      z-index: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      background: transparent url('https://assets.codepen.io/1538474/starfield.png') repeat;
      opacity: 0.15;
      animation: starsMove 180s linear infinite;
      z-index: 1;
    }

    @keyframes starsMove {
      from { background-position: 0 0; }
      to { background-position: -1000px -1000px; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      z-index: 2;
      animation: floatOrb 30s ease-in-out infinite alternate;
    }
    .orb-1 { width: 700px; height: 700px; top: -200px; right: -150px; background: radial-gradient(circle, var(--primary), transparent); }
    .orb-2 { width: 600px; height: 600px; bottom: -250px; left: -100px; background: radial-gradient(circle, var(--accent), transparent); animation-delay: -12s; }

    /* HEADER */
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(5, 8, 15, 0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 245, 255, 0.15);
    }

    .brand h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(90deg, #67e8f9, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .status-bar {
      font-size: 12px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* MAIN */
    .hub-wrap {
      position: relative;
      z-index: 10;
      max-width: 1100px;
      margin: 100px auto 0;
      padding: 0 20px;
      text-align: center;
    }

    .hub-headline h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e0f2fe, #67e8f9, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hub-headline p {
      font-size: 15px;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    /* CARDS */
    .kartu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
      margin-top: 60px;
    }

    .kartu {
      position: relative;
      padding: 40px 28px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(103, 232, 249, 0.2);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      cursor: pointer;
    }

    .kartu:hover {
      transform: translateY(-15px) scale(1.04);
      border-color: var(--primary);
      box-shadow: 0 0 60px rgba(0, 245, 255, 0.3);
    }

    .kartu::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.07), transparent);
      transform: translateX(-100%);
      transition: 0.8s;
    }

    .kartu:hover::before {
      transform: translateX(300%);
    }

    .ikon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      font-size: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      transition: all 0.4s;
    }

    .kartu:hover .ikon-wrap {
      transform: scale(1.15) rotate(8deg);
      background: rgba(0, 245, 255, 0.1);
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
    }

    .judul-kartu {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #e0f2fe;
    }

    .desc-kartu {
      color: #94a3b8;
      line-height: 1.6;
      font-size: 14.5px;
    }

    .buka-btn {
      margin-top: 28px;
      padding: 12px 32px;
      background: rgba(0, 245, 255, 0.1);
      color: white;
      border: 1px solid rgba(0, 245, 255, 0.4);
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.4s;
    }

    .kartu:hover .buka-btn {
      background: var(--primary);
      color: #05080f;
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.6);
    }

    /* FOOTER CREDIT - Dipercerah */
    .footer-credit {
      position: fixed;
      bottom: 24px;
      right: 32px;
      font-size: 12px;
      color: rgba(148, 163, 184, 0.65);   /* Dipercerah */
      z-index: 100;
      font-weight: 400;
      letter-spacing: 0.8px;
      text-shadow: 0 0 8px rgba(0, 245, 255, 0.2);
    }
  </style>
</head>
<body>

  <div class="bg-universe"></div>
  <div class="stars"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- HEADER -->
  <header class="app-header">
    <div class="brand">
      <h1>GAMAS 2026</h1>
    </div>
    <div class="status-bar">
      <span class="dot"></span>
      NEURAL CORE ONLINE
    </div>
  </header>

  <!-- MAIN -->
  <div class="hub-wrap">
    <div class="hub-headline">
      <h2>COMMAND CENTER</h2>
      <p>SISTEM OPERASIONAL • REAL-TIME</p>
    </div>

    <div class="kartu-grid">
      <a class="kartu" href="dashboard-kerja.html">
        <div class="ikon-wrap">🧠</div>
        <div class="judul-kartu">DASHBOARD KERJA</div>
        <div class="desc-kartu">Orkestrasi tugas, workflow, dan kolaborasi tim</div>
        <button class="buka-btn">AKSES MODULE →</button>
      </a>

      <a class="kartu" href="dashboard-laporan.html">
        <div class="ikon-wrap">📡</div>
        <div class="judul-kartu">DASHBOARD LAPORAN</div>
        <div class="desc-kartu">Analitik real-time dan predictive insight</div>
        <button class="buka-btn">AKSES MODULE →</button>
      </a>

      <a class="kartu" href="dashboard-data.html">
        <div class="ikon-wrap">🛰️</div>
        <div class="judul-kartu">DASHBOARD DATA</div>
        <div class="desc-kartu">Manajemen dataset dan neural intelligence</div>
        <button class="buka-btn">AKSES MODULE →</button>
      </a>
    </div>
  </div>

  <!-- Credit -->
  <div class="footer-credit">
    by Hamung 2026
  </div>

  <script>
    document.querySelectorAll('.kartu').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mx', `${x}%`);
        card.style.setProperty('--my', `${y}%`);
      });
    });
  </script>
</body>
</html>
